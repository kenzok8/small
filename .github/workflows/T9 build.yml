name: T9 Build

on:
  workflow_dispatch:
    inputs:
      plugins:
        description: '输入: 留空=全部, 1=最近1天更新, 2=最近2天更新, 或插件名(空格分隔)'
        required: false
        default: ''
  push:
    tags:
      - v.**

jobs:
  build:
    name: build ${{ matrix.arch }}-${{ matrix.sdk }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk:
          - 24.10.5
          - 25.12.0
        arch:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_generic
          - arm_cortex-a15_neon-vfpv4
          - arm_cortex-a5_vfpv4
          - arm_cortex-a7
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a8_vfpv3
          - arm_cortex-a9
          - arm_cortex-a9_neon
          - arm_cortex-a9_vfpv3-d16
          - arm_fa526
          - i386_pentium-mmx
          - i386_pentium4
          - mips64_octeonplus
          - mips_24kc
          - mips_4kec
          - mips_mips32
          - mipsel_24kc
          - mipsel_24kc_24kf
          - mipsel_74kc
          - mipsel_mips32
          - x86_64
        exclude:
          - sdk: 25.12.0
            arch: mips_4kec

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Get packages to build
        id: packages
        run: |
          input="${{ github.event.inputs.plugins }}"
          
          if [ -z "$input" ] || [ "$input" == "*" ]; then
            PACKAGES=$(find . -maxdepth 1 -type d ! -name '.' ! -name '.git' ! -name '.github' -printf '%f ' | sed 's/ $//')
            echo "编译所有包: $PACKAGES"
            echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          elif [ "$input" == "1" ]; then
            SINCE_DAYS=1
            PACKAGES=$(git log --since="${SINCE_DAYS} days ago" --name-only --pretty=format: | grep -v '^$' | awk -F'/' '{print $1}' | sort -u | grep -v '^\.\|^$' | while read pkg; do [ -f "$pkg/Makefile" ] && echo "$pkg"; done | tr '\n' ' ' | sed 's/ $//')
            echo "最近1天更新的包: $PACKAGES"
            echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          elif [ "$input" == "2" ]; then
            SINCE_DAYS=2
            PACKAGES=$(git log --since="${SINCE_DAYS} days ago" --name-only --pretty=format: | grep -v '^$' | awk -F'/' '{print $1}' | sort -u | grep -v '^\.\|^$' | while read pkg; do [ -f "$pkg/Makefile" ] && echo "$pkg"; done | tr '\n' ' ' | sed 's/ $//')
            echo "最近2天更新的包: $PACKAGES"
            echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          else
            echo "编译指定包: $input"
            echo "packages=$input" >> $GITHUB_OUTPUT
          fi

      - name: Delete workflow runs
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          REPO: ${{ github.repository }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RETAIN_DAYS: "10"
          KEEP_MINIMUM_RUNS: "8"
        run: |
          set -euo pipefail
          cutoff=$(date -u -d "${RETAIN_DAYS} days ago" +%s)
          mapfile -t runs < <(gh run list --repo "$REPO" --workflow "$WORKFLOW_NAME" --limit 200 --json databaseId,createdAt --jq '.[] | [.databaseId, .createdAt] | @tsv')
          total=${#runs[@]}
          if [ "$total" -le "$KEEP_MINIMUM_RUNS" ]; then
            echo "No workflow runs to delete ($total <= $KEEP_MINIMUM_RUNS)"
            exit 0
          fi
          index=0
          for run in "${runs[@]}"; do
            index=$((index + 1))
            if [ "$index" -le "$KEEP_MINIMUM_RUNS" ]; then
              continue
            fi
            run_id=${run%%$'\t'*}
            created_at=${run#*$'\t'}
            created_epoch=$(date -u -d "$created_at" +%s)
            if [ "$created_epoch" -gt "$cutoff" ]; then
              continue
            fi
            echo "Deleting workflow run $run_id ($created_at)"
            gh api --method DELETE "repos/$REPO/actions/runs/$run_id" || true
          done

      - name: Remove old Releases
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          REPO: ${{ github.repository }}
          KEEP: "81"
        run: |
          set -euo pipefail
          mapfile -t tags < <(gh release list --repo "$REPO" --limit 200 --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[].tagName')
          total=${#tags[@]}
          if [ "$total" -le "$KEEP" ]; then
            echo "No old releases to delete ($total <= $KEEP)"
            exit 0
          fi
          for tag in "${tags[@]:$KEEP}"; do
            echo "Deleting $tag"
            gh release delete "$tag" --repo "$REPO" --yes --cleanup-tag || true
          done

      - name: Build
        uses: kenzok8/gh-action-sdk@hash
        env:
          CONTAINER: immortalwrt/sdk
          ARCH: ${{ matrix.arch }}-openwrt-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: luci-app-clashoo luci-app-fchomo luci-app-homeproxy luci-app-momo luci-app-nikki luci-app-openclash luci-app-passwall luci-app-passwall2 luci-app-ssr-plus brook hysteria ipt2socks pdnsd-alt redsocks2 shadow-tls trojan tuic-client xray-plugin v2ray-core v2ray-geodata naiveproxy sing-box
          NO_REFRESH_CHECK: true
          IGNORE_ERRORS: true
          INDEX: 1
          # 24.10 SDK 仅带 Go 1.23，编不了 sing-box 1.13+（需 Go 1.24.7）。
          # 用自维护的 golang feed 统一替换为 Go 1.26.3。
          GOLANG_REPO: https://github.com/kenzok8/golang
          GOLANG_BRANCH: '1.26'

      - name: Store packages
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ matrix.arch }}-${{ matrix.sdk }}
          path: |
            bin/packages/${{ matrix.arch }}/packages_ci/*.ipk
            bin/packages/${{ matrix.arch }}/packages_ci/*.apk

      - name: Zip packages
        run: |
          shopt -s nullglob
          packages=(bin/packages/${{ matrix.arch }}/packages_ci/*.ipk bin/packages/${{ matrix.arch }}/packages_ci/*.apk)
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No packages found"
            exit 1
          fi
          zip -j ${{ matrix.arch }}-${{ matrix.sdk }}.zip "${packages[@]}"
          mkdir -p release-assets
          cp "${packages[@]}" release-assets/
          cp ${{ matrix.arch }}-${{ matrix.sdk }}.zip release-assets/
          echo -e "**文件说明** 🎈:\n" >> release.txt
          echo -e "1. 默认ssr与passwall的插件与依赖整合包\n" >> release.txt
          case "${{ matrix.sdk }}" in
            25.*) echo -e "2. immortalwrt ${{ matrix.sdk }} 使用：\`apk add --allow-untrusted ./*.apk\`\n" >> release.txt ;;
            *)    echo -e "2. immortalwrt ${{ matrix.sdk }} 使用：\`opkg install *.ipk\`\n" >> release.txt ;;
          esac
          echo -e "3. 默认压缩包里包含ssr passwall passwall2 等插件\n" >> release.txt
          echo -e "4. 如果单独安装ssr与依赖，\`rm -rf {*passwall*,*homeproxy*}\`\n" >> release.txt
          
      - name: Upload packages
        uses: ncipollo/release-action@v1.21.0
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          artifacts: "release-assets/*"
          allowUpdates: true
          replacesArtifacts: true
          bodyFile: "release.txt"
          tag: ${{ github.run_number }}-${{ matrix.arch }}-${{ matrix.sdk }}
